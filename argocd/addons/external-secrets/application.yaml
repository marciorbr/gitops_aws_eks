apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  labels:
    app: external-secrets
    project: default
spec:
  project: default
  destination:
    name: in-cluster
    namespace: external-secrets
  sources:
  - repoURL: 'https://charts.external-secrets.io'
    chart: external-secrets
    targetRevision: 2.2.0
    helm:
      releaseName: external-secrets
      valueFiles:
      - $values/argocd/addons/external-secrets/values.yaml
  - repoURL: 'https://github.com/marciorbr/gitops_aws_eks.git'
    targetRevision: main
    ref: values
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true