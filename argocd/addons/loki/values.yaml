loki:
    auth_enabled: false
    schemaConfig:
        configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    storage_config:
        aws:
            region: ${var.region}
            bucketnames: eks-loki-chunks-control-plane
            s3forcepathstyle: false
    storage:
        type: s3
        bucketNames:
            chunks: eks-loki-chunks-control-plane
            ruler: eks-loki-ruler-control-plane
            admin: eks-loki-admin-control-plane
    ingester:
        chunk_encoding: snappy
    querier:
        # Default is 4, if you have enough memory and CPU you can increase, reduce if OOMing
        max_concurrent: 4
    pattern_ingester:
        enabled: true
    limits_config:
        allow_structured_metadata: true
        volume_enabled: true
        retention_period: 672h

deploymentMode: SimpleScalable

chunksCache:
    replicas: 1
    nodeSelector:
        karpenter.sh/nodepool: loki

backend:
    replicas: 3
    persistence:
        storageClass: dynamic-efs-sc

    nodeSelector:
        karpenter.sh/nodepool: loki

read:
    replicas: 3
    nodeSelector:
        karpenter.sh/nodepool: loki

write:
    replicas: 3
    persistence:
        storageClass: dynamic-efs-sc

    nodeSelector:
        karpenter.sh/nodepool: loki        

gateway:
    replicas: 3
    service:
        type: NodePort

    nodeSelector:
        karpenter.sh/nodepool: loki

minio:
    enabled: false