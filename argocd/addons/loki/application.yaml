apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: loki
  labels:
    app: loki
    project: observability
spec:
  project: observability
  destination:
    name: in-cluster
    namespace: loki
  sources:
  - repoURL: 'https://grafana.github.io/helm-charts'
    chart: loki
    targetRevision: 6.38.0
    helm:
      releaseName: loki
      valueFiles:
      - $values/argocd/addons/loki/values.yaml
  - repoURL: 'https://github.com/marciorbr/gitops_aws_eks.git'
    targetRevision: main
    ref: values
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true